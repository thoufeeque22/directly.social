name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'The Git Commit SHA to rollback to'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
    - name: Rollback Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e
          
          BASE_DIR="~/directly.social"
          TARGET_DIR="$BASE_DIR/releases/${{ github.event.inputs.commit_sha }}"
          CURRENT_DIR="$BASE_DIR/current"
          
          if [ ! -d "$TARGET_DIR" ]; then
            echo "❌ Error: Release directory $TARGET_DIR does not exist on the server."
            exit 1
          fi
          
          echo "🔄 Rolling back to $TARGET_DIR..."
          
          # Swap symlink
          ln -sfn $TARGET_DIR $CURRENT_DIR
          
          # Restart PM2
          cd $CURRENT_DIR
          echo "🔄 Restarting PM2 processes..."
          pm2 restart directly-production --update-env || pm2 start "pnpm start" --name "directly-production"
          pm2 restart directly-worker-production --update-env || pm2 start "pnpm run worker" --name "directly-worker-production"
          
          echo "✅ Rollback successful!"
