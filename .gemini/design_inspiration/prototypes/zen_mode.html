<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Mode | Surprise</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --accent-color: #70a1ff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #e0e0e0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .glass-card {
            position: relative;
            z-index: 1;
            padding: 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            width: 320px;
            user-select: none;
        }

        #clock {
            font-size: 3.5rem;
            font-weight: 200;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .breathing-container {
            margin-top: 2rem;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #breathing-text {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.6;
            transition: opacity 0.5s ease;
        }

        .pulse {
            animation: breathe 8s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.8); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .instructions {
            position: absolute;
            bottom: 2rem;
            font-size: 0.8rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="glass-card">
        <div id="clock">00:00:00</div>
        <div class="breathing-container">
            <div id="breathing-text" class="pulse">Inhale</div>
        </div>
    </div>

    <div class="instructions">MOVE YOUR MOUSE TO INTERACT</div>

    <script>
        // --- CLOCK LOGIC ---
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- BREATHING LOGIC ---
        const breathText = document.getElementById('breathing-text');
        const states = ['Inhale', 'Hold', 'Exhale', 'Hold'];
        let currentState = 0;

        setInterval(() => {
            currentState = (currentState + 1) % states.length;
            breathText.textContent = states[currentState];
        }, 2000); // Text updates faster than the 8s animation for variety

        // --- CANVAS PARTICLES LOGIC ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, particles;
        const particleCount = 120;
        const mouse = { x: -1000, y: -1000 };

        class Particle {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2 + 0.5;
                this.color = `rgba(112, 161, 255, ${Math.random() * 0.5 + 0.2})`;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Wrap around edges
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // Mouse interaction
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 150) {
                    const force = (150 - distance) / 150;
                    this.x -= dx * force * 0.02;
                    this.y -= dy * force * 0.02;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Subtle gradient background
            const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
            grad.addColorStop(0, '#0f0f1a');
            grad.addColorStop(1, '#0a0a12');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        resize();
        animate();
    </script>
</body>
</html>
