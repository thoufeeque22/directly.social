<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento Dashboard</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --accent: #6366f1;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --radius: 24px;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 140px);
            gap: 1.5rem;
            width: 90%;
            max-width: 1000px;
            padding: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
        }

        .card h3 {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card .value {
            font-size: 2rem;
            font-weight: 700;
        }

        /* Bento Layout Spanning */
        .large { grid-column: span 2; grid-row: span 2; }
        .wide { grid-column: span 2; }
        .tall { grid-row: span 2; }

        /* Specific Card Styles */
        .chart-sim {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 60px;
        }
        .bar {
            flex: 1;
            background: var(--accent);
            border-radius: 4px 4px 0 0;
            transition: height 1s ease-out;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .icon-placeholder {
            position: absolute;
            right: 1.5rem;
            top: 1.5rem;
            font-size: 1.5rem;
            opacity: 0.2;
        }
    </style>
</head>
<body>

    <div class="bento-grid">
        <!-- Large Card: Activity -->
        <div class="card large">
            <div>
                <h3>Weekly Activity</h3>
                <div class="value" id="activity-val">84%</div>
            </div>
            <div class="chart-sim" id="chart">
                <!-- Bars generated by JS -->
            </div>
            <div class="icon-placeholder">📈</div>
        </div>

        <!-- Medium Card: Messages -->
        <div class="card">
            <div>
                <h3>Messages</h3>
                <div class="value">12</div>
            </div>
            <div style="color: var(--accent); font-size: 0.8rem; font-weight: 600;">+3 new</div>
            <div class="icon-placeholder">✉️</div>
        </div>

        <!-- Small Card: Status -->
        <div class="card">
            <div>
                <h3>System</h3>
                <div style="display: flex; align-items: center; margin-top: 0.5rem;">
                    <span class="status-dot"></span>
                    <span style="font-weight: 600;">Live</span>
                </div>
            </div>
            <div class="icon-placeholder">⚡</div>
        </div>

        <!-- Wide Card: Revenue -->
        <div class="card wide">
            <div>
                <h3>Revenue</h3>
                <div class="value">$12,450</div>
            </div>
            <div style="font-size: 0.8rem; color: var(--text-sub);">Last 30 days</div>
            <div class="icon-placeholder">💰</div>
        </div>

        <!-- Tall Card: Tasks -->
        <div class="card tall">
            <div>
                <h3>Tasks</h3>
                <div style="margin-top: 1rem;">
                    <div style="margin-bottom: 1rem; font-size: 0.9rem;">✅ Design Review</div>
                    <div style="margin-bottom: 1rem; font-size: 0.9rem;">✅ API Integration</div>
                    <div style="margin-bottom: 1rem; font-size: 0.9rem; opacity: 0.5;">⏳ User Testing</div>
                    <div style="margin-bottom: 1rem; font-size: 0.9rem; opacity: 0.5;">⏳ Deployment</div>
                </div>
            </div>
            <div class="icon-placeholder">📋</div>
        </div>

        <!-- Small Card: Weather/Time -->
        <div class="card">
            <div>
                <h3>Local Time</h3>
                <div class="value" id="time-val" style="font-size: 1.2rem;">12:00</div>
            </div>
            <div class="icon-placeholder">🕒</div>
        </div>
    </div>

    <script>
        // Generate Chart Bars
        const chart = document.getElementById('chart');
        for(let i=0; i<12; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = Math.random() * 100 + '%';
            chart.appendChild(bar);
        }

        // Update Time
        function updateTime() {
            const now = new Date();
            document.getElementById('time-val').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Randomize Chart for "Live" feel
        setInterval(() => {
            const bars = document.querySelectorAll('.bar');
            const target = bars[Math.floor(Math.random() * bars.length)];
            target.style.height = Math.random() * 100 + '%';
        }, 2000);
    </script>
</body>
</html>
