# -----------------------------------------------------------
# Test: Deep Linking
# Purpose: Verifies that the app handles deep links correctly
# and routes the user to the appropriate screen on launch.
# -----------------------------------------------------------
appId: com.thoufeeque.directly
---
- launchApp
- runFlow:
    when:
      visible: "Login"
    file: subflows/login.yaml
- openLink: "directly://upload"
- assertVisible: "Upload & Automate"
