# -----------------------------------------------------------
# Test: Native Media Picker Integration
# Purpose: Verifies that tapping the "Browse Gallery" button 
# correctly launches the native OS file/media picker UI.
# -----------------------------------------------------------
appId: com.thoufeeque.directly
---
- launchApp:
    permissions:
      all: grant
- runFlow:
    when:
      visible: "Login"
    file: subflows/login.yaml
- assertVisible: "Upload & Automate"
- tapOn: "Browse Gallery"
- assertVisible: "Choose Media"
- assertVisible: "Staged Media"
- tapOn: "Local Gallery"
- assertVisible: "Select"
