# -----------------------------------------------------------
# Test: Core Smoke Test
# Purpose: Verifies the app boots successfully and displays 
# the initial splash/login screen without crashing.
# -----------------------------------------------------------
appId: com.thoufeeque.directly
---
- launchApp
- runFlow:
    when:
      visible: "Login"
    file: subflows/login.yaml
- assertVisible: "Upload & Automate"
- tapOn: "☰"
- assertVisible: "Activity Hub"
