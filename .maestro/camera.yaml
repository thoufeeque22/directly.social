# -----------------------------------------------------------
# Test: Native Camera Integration
# Purpose: Verifies that tapping the "Record Video" button 
# correctly requests permissions and launches the OS camera.
# -----------------------------------------------------------
appId: com.thoufeeque.directly
---
- launchApp:
    permissions:
      all: grant
- runFlow:
    when:
      visible: "Login"
    file: subflows/login.yaml
- assertVisible: "Upload & Automate"
- tapOn: "Record Video"
# Maestro will handle the permission dialog automatically if it appears (due to `permissions: all: grant`),
# The OS Camera takes over the screen. Since Maestro cannot assert inside it reliably,
# and it lacks a native sleep command, we consider the flow successful once the button is tapped.
# Maestro will automatically close the app when the test finishes.
